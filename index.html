<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دليل التعليمات المدرسيّة لأولياء الأمر والطلبة | 2026-2027</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Markazi+Text:wght@500;600;700&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  @font-face{
    font-family:'URW Geometric Arabic';
    src: url('fonts/URWGEOMETRICARABIC-REGULAR.220826-1203.TTF') format('truetype');
    font-weight:400; font-style:normal; font-display:swap;
  }
  @font-face{
    font-family:'URW Geometric Arabic';
    src: url('fonts/URWGEOMETRICARABIC-MEDIUM.220826-1204.TTF') format('truetype');
    font-weight:500; font-style:normal; font-display:swap;
  }
  @font-face{
    font-family:'URW Geometric Arabic';
    src: url('fonts/URWGEOMETRICARABIC-SEMIBOLD.TTF') format('truetype');
    font-weight:600; font-style:normal; font-display:swap;
  }
  @font-face{
    font-family:'URW Geometric Arabic';
    src: url('fonts/URWGEOMETRICARABIC-BOLD.220826-1204.TTF') format('truetype');
    font-weight:700; font-style:normal; font-display:swap;
  }
  @font-face{
    font-family:'URW Geometric Arabic';
    src: url('fonts/URWGEOMETRICARABIC-BLACK.220826-1202.TTF') format('truetype');
    font-weight:900; font-style:normal; font-display:swap;
  }
  :root{
    --bg:#f3f6f4;
    --surface:#ffffff;
    --surface-2:#eef3f0;
    --ink:#182420;
    --muted:#5c6b64;
    --primary:#1f6f5c;
    --primary-dark:#134a3d;
    --primary-tint:#e4f1ec;
    --accent:#c9483a;
    --accent-tint:#fbe9e6;
    --gold:#c9a24b;
    --gold-tint:#faf3e2;
    --line:#e5e9e6;
    --shadow-sm:0 1px 3px rgba(20,40,32,0.06);
    --shadow-md:0 8px 24px rgba(20,40,32,0.08);
    --shadow-lg:0 16px 40px rgba(20,40,32,0.14);
    --radius:18px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth; overflow-x:hidden; width:100%;}
  [id]{scroll-margin-top:118px;}
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
  }
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'URW Geometric Arabic', 'Tajawal', sans-serif; line-height:1.8; font-size:16.5px;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  h1,h2,h3,h4{font-family:'URW Geometric Arabic', 'Tajawal', sans-serif; color:var(--ink); margin:0; font-weight:700;}
  p,li{margin:0 0 10px;}
  ul{padding-inline-start:22px; margin:0 0 14px;}
  a{color:inherit;}

  /* ===== SCROLL PROGRESS ===== */
  #scrollProgress{
    position:fixed; top:0; right:0; left:0; height:3px; z-index:100;
    background:linear-gradient(90deg, var(--gold), var(--accent), var(--primary));
    transform-origin:right;
    transform:scaleX(0);
    transition:transform .1s linear;
  }

  /* ===== MOBILE HAMBURGER MENU ===== */
  .mobile-menu-btn{
    display:none; flex-direction:column; justify-content:center; gap:5px;
    width:42px; height:42px; border-radius:10px; border:none; background:var(--surface-2);
    cursor:pointer; flex-shrink:0;
  }
  .mobile-menu-btn span{
    display:block; width:20px; height:2px; background:var(--primary); margin:0 auto; border-radius:2px;
  }
  .mobile-menu-overlay{
    display:none; position:fixed; inset:0; z-index:200;
    background:rgba(15,25,20,0.45);
  }
  .mobile-menu-overlay.open{display:block;}
  .mobile-menu-panel{
    position:absolute; top:0; right:0; height:100%; width:82%; max-width:340px;
    background:var(--primary-dark); box-shadow:var(--shadow-lg);
    padding:76px 26px 40px; overflow-y:auto;
    transform:translateX(100%); transition:transform .28s ease;
  }
  .mobile-menu-overlay.open .mobile-menu-panel{transform:translateX(0);}
  .mobile-menu-close{
    position:absolute; top:18px; left:18px; width:38px; height:38px; border-radius:50%;
    background:rgba(255,255,255,0.12); color:#fff; border:none; font-size:1.4rem; line-height:1;
    cursor:pointer;
  }
  .mobile-menu-list{display:flex; flex-direction:column;}
  .mobile-menu-list a{
    display:block; color:#fff; font-weight:700; font-size:0.98rem;
    padding:15px 4px; border-bottom:1px solid rgba(255,255,255,0.15);
    text-decoration:none;
  }
  .mobile-menu-list a:hover, .mobile-menu-list a:focus-visible{color:var(--gold);}

  /* ===== STICKY HEADER (Unified for Computer & Mobile) ===== */
  header.top{
    position:sticky;
    top:3px; /* Positioned right beneath the scroll progress bar */
    z-index:65;
    background:var(--surface);
    width:100%;
    box-sizing:border-box;
    box-shadow:var(--shadow-sm);
  }
  .header-inner{
    padding:16px 24px;
    display:flex; align-items:center; gap:16px;
    max-width:1180px; width:100%; margin:0 auto;
    box-sizing:border-box;
  }
  .emblem{
    display:block; width:52px; height:auto; flex-shrink:0;
    border-radius:12px; box-shadow:var(--shadow-sm);
  }
  header.top .head-text{text-align:right; flex:1; min-width:0;}
  header.top .school-name{
    font-weight:700; font-size:0.78rem; letter-spacing:1px;
    color:var(--primary); margin-bottom:2px;
  }
  header.top h1{font-size:1.15rem; line-height:1.35; font-weight:800;}
  header.top .year{
    display:inline-block; margin-top:4px; font-weight:600; letter-spacing:.5px;
    color:var(--ink); background:var(--gold-tint); border:1px solid var(--gold);
    padding:2px 12px; border-radius:20px; font-size:0.72rem;
  }

  /* ===== QUICK NAV (segmented tab bar) ===== */
  nav.quicknav{
    position:sticky; top:83px; z-index:60; /* Adjusted automatically based on sticky header height */
    background:var(--surface);
    border-bottom:1px solid var(--line);
    box-shadow:var(--shadow-sm);
  }
  .quicknav-inner{
    max-width:1180px; margin:0 auto; padding:8px 20px;
    display:flex; flex-wrap:wrap; gap:6px;
  }
  .quicknav-item{position:relative; flex-shrink:0;}
  .quicknav-inner a{
    flex-shrink:0; text-decoration:none; font-weight:600; font-size:0.86rem;
    color:var(--muted); background:transparent;
    padding:9px 16px; border-radius:22px; white-space:nowrap; display:inline-block;
    transition:background .15s ease, color .15s ease;
  }
  .quicknav-inner > .quicknav-item > a:hover,
  .quicknav-inner > .quicknav-item > a:focus-visible{
    background:var(--surface-2); color:var(--ink); outline:none;
  }
  .quicknav-item.active > a{
    background:var(--primary); color:#fff;
  }

  .quicknav-drop{
    display:none; position:absolute; top:100%; right:0; z-index:80;
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    box-shadow:var(--shadow-lg);
    min-width:250px; padding:8px; margin-top:6px;
    flex-direction:column; gap:2px;
  }
  .quicknav-item::after{
    content:""; position:absolute; top:100%; right:0; left:0; height:10px;
  }
  .quicknav-item:hover .quicknav-drop,
  .quicknav-item:focus-within .quicknav-drop{
    display:flex;
  }
  .quicknav-drop a{
    background:none; border:none; border-radius:8px; padding:9px 12px;
    font-size:0.84rem; font-weight:500; color:var(--ink); text-align:right;
    white-space:normal;
  }
  .quicknav-drop a:hover, .quicknav-drop a:focus-visible{
    background:var(--primary-tint); color:var(--primary-dark);
  }

  /* ===== BACK TO TOP ===== */
  #backToTop{
    position:fixed; bottom:26px; left:26px; z-index:70;
    width:50px; height:50px; border-radius:50%;
    background:var(--primary); color:#fff; border:none;
    font-size:1.3rem; cursor:pointer; display:none;
    align-items:center; justify-content:center;
    box-shadow:var(--shadow-lg);
    transition:transform .15s ease, background .15s ease;
  }
  #backToTop:hover{transform:translateY(-3px); background:var(--primary-dark);}
  #backToTop.show{display:flex;}

  /* ===== LAYOUT ===== */
  .layout{
    max-width:1180px; margin:0 auto; display:flex; gap:28px; align-items:flex-start;
    padding-top:24px;
  }
  nav.toc{
    width:270px; flex-shrink:0; position:sticky; top:140px;
    max-height:calc(100vh - 160px); overflow-y:auto;
    background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow-sm);
    padding:22px 18px; margin-inline-start:20px;
  }
  nav.toc .toc-label{
    font-weight:800; color:var(--ink);
    font-size:0.78rem; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:14px; display:block;
  }
  nav.toc details{margin-bottom:4px;}
  nav.toc summary{
    cursor:pointer; font-weight:700; color:var(--ink); padding:9px 10px;
    border-radius:10px; list-style:none; font-size:0.92rem;
    display:flex; align-items:center; justify-content:space-between;
  }
  nav.toc summary::-webkit-details-marker{display:none;}
  nav.toc summary::before{
    content:"◂"; color:var(--primary); font-size:0.75em;
    display:inline-block; transition:transform .15s ease; order:-1; margin-left:8px;
  }
  nav.toc details[open] > summary::before{transform:rotate(-90deg);}
  nav.toc summary:hover{background:var(--surface-2);}
  nav.toc ul{list-style:none; padding-inline-start:18px; margin:2px 0 8px;}
  nav.toc a{
    display:block; text-decoration:none; font-size:0.84rem; color:var(--muted);
    padding:6px 10px; border-radius:8px;
  }
  nav.toc a:hover, nav.toc a:focus-visible{background:var(--primary-tint); color:var(--primary-dark); outline:none;}

  main{flex:1; min-width:0; padding:0 24px 100px 4px;}

  .intro-note{
    background:var(--primary-tint); border-radius:var(--radius);
    padding:20px 24px; margin-bottom:36px; font-size:0.96rem; color:var(--primary-dark);
    border:1px solid rgba(31,111,92,0.15);
  }

  .part{margin-bottom:40px;}
  .part-head{
    display:flex; align-items:baseline; gap:14px; margin-bottom:16px;
    padding-bottom:0;
  }
  .part-num{
    font-weight:700; font-size:0.85rem; color:#fff; background:var(--gold);
    padding:3px 12px; border-radius:20px;
  }
  .part-head h2{font-size:1.5rem; font-weight:800;}

  article.sec{
    background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow-sm);
    padding:26px 28px; margin-bottom:16px;
  }
  article.sec h3{font-size:1.2rem; margin-bottom:12px; font-weight:700; color:var(--primary-dark);}
  article.sec h4{font-size:1.02rem; color:var(--accent); margin:14px 0 6px; font-weight:700;}
  article.sec .note{
    background:var(--gold-tint); border-radius:12px;
    padding:12px 16px; font-size:0.92rem; margin-top:10px; color:#6b5119;
  }
  article.sec .note::before{content:"💡 "; }
  article.sec .warn{
    background:var(--accent-tint); border-radius:12px;
    padding:12px 16px; font-size:0.92rem; margin-top:10px; color:var(--accent); font-weight:700;
  }
  article.sec .warn::before{content:"⚠️ "; }

  .table-wrap{overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius:12px; margin:10px 0 16px;}
  .table-wrap table.simple{margin:0; min-width:480px;}
  table.simple{width:100%; border-collapse:separate; border-spacing:0; margin:10px 0 16px; font-size:0.9rem; border-radius:12px; overflow:hidden; box-shadow:var(--shadow-sm);}
  table.simple th, table.simple td{padding:10px 12px; text-align:right; border-bottom:1px solid var(--line);}
  table.simple th{background:var(--primary); color:#fff; font-weight:700; border-bottom:none;}
  table.simple tr:nth-child(even) td{background:var(--surface-2);}
  table.simple tr:last-child td{border-bottom:none;}

  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media (max-width:760px){.grid2{grid-template-columns:1fr;}}
  .grid2 > div{background:var(--surface-2); border-radius:12px; padding:14px 16px;}

  .appendix-list{list-style:none; padding:0; display:grid; gap:10px;}
  .appendix-list li{
    background:var(--surface-2); border-radius:12px; padding:14px 18px;
    display:flex; align-items:center; gap:10px; font-weight:700; color:var(--primary-dark);
  }
  .appendix-list li::before{content:"📎"; font-size:1.1rem;}

  footer.site{
    text-align:center; padding:36px 20px; color:var(--muted); font-size:0.88rem;
  }

  @media (max-width:900px){
    [id]{scroll-margin-top:140px;}
    .layout{flex-direction:column; padding-top:16px;}
    nav.toc{display:none;}
    main{padding:0 16px 80px;}
    nav.quicknav{display:none;}
    .mobile-menu-btn{display:flex;}
  }

  @media (max-width:900px){
    .header-inner{
      flex-wrap:wrap;
      row-gap:8px;
      padding:12px 16px;
    }
    .mobile-menu-btn{order:-1;}
    .emblem{order:2; width:44px;}
    header.top .head-text{order:3; flex:1 1 100%; width:100%; text-align:right;}
  }

  @media (max-width:640px){
    body{font-size:15.5px;}
    .header-inner{gap:8px; padding:10px 12px;}
    .emblem{width:40px; border-radius:10px;}
    header.top .head-text{min-width:0;}
    header.top h1{
      font-size:0.98rem; white-space:normal; line-height:1.3;
    }
    header.top .school-name{display:block; font-size:0.68rem;}
    header.top .year{display:inline-block; font-size:0.65rem; padding:2px 8px; margin-top:3px;}
    .quicknav-inner{padding:8px 12px; gap:5px;}
    .quicknav-inner a{padding:7px 12px; font-size:0.8rem;}
    .quicknav-drop{
      position:fixed; top:118px; right:12px; left:12px; margin-top:0;
      min-width:0; width:auto; max-height:60vh; overflow-y:auto;
    }
    .part-head h2{font-size:1.25rem;}
    article.sec{padding:18px 16px;}
    .intro-note{padding:16px 18px; font-size:0.9rem;}
    #backToTop{width:42px; height:42px; bottom:16px; left:16px; font-size:1.1rem;}
    nav.toc{padding:16px 14px; margin:0 12px 14px;}
  }

  a:focus-visible, summary:focus-visible{outline:3px solid var(--gold); outline-offset:2px;}
</style>
</head>
